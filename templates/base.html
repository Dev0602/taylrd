<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Taylrd — AI Resume Tailor{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  background:#0a0a0a;
  color:#ffffff;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
.page-watermark{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Inter',sans-serif;
  font-size:clamp(160px,22vw,320px);
  font-weight:900;
  letter-spacing:-8px;
  color:transparent;
  -webkit-text-stroke:2px rgba(255,255,255,0.06);
  pointer-events:none;
  user-select:none;
  white-space:nowrap;
  z-index:0;
}
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:64px;padding:0 48px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,10,10,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid #1f1f1f;
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-box{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,#7f1d1d,#991b1b);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;color:white;
}
.logo-name{font-size:17px;font-weight:800;letter-spacing:-0.5px;color:#fff}
.nav-steps{display:flex;align-items:center;gap:6px}
.ns{
  display:flex;align-items:center;gap:7px;
  font-size:13px;font-weight:600;color:#444;
  padding:6px 14px;border-radius:8px;
  transition:all 0.2s;
}
.ns.active{color:#fff;background:#1a0808}
.ns.done{color:#991b1b}
.ns-num{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid #333;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;
  transition:all 0.2s;
}
.ns.active .ns-num{background:#991b1b;border-color:#991b1b;color:#fff}
.ns.done .ns-num{background:#991b1b;border-color:#991b1b;color:#fff}
.ns-div{width:20px;height:1px;background:#222}
.main{padding-top:64px;min-height:100vh;position:relative;z-index:1}
</style>
{% block extra_styles %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="logo">
    <div class="logo-box">T</div>
    <span class="logo-name">Taylrd</span>
  </a>
  <div class="nav-steps">
    <div class="ns {% block step1_class %}{% endblock %}">
      <div class="ns-num">1</div><span>Upload</span>
    </div>
    <div class="ns-div"></div>
    <div class="ns {% block step2_class %}{% endblock %}">
      <div class="ns-num">2</div><span>Job Description</span>
    </div>
    <div class="ns-div"></div>
    <div class="ns {% block step3_class %}{% endblock %}">
      <div class="ns-num">3</div><span>Results</span>
    </div>
    <div class="ns-div"></div>
    <div class="ns {% block step4_class %}{% endblock %}">
      <div class="ns-num">4</div><span>Download</span>
    </div>
  </div>
  <div style="width:120px"></div>
</nav>
<main class="main">
  {% block content %}{% endblock %}
</main>
{% block scripts %}{% endblock %}
</body>
</html>
